# fly.toml — paywallapp
app = "paywallapp"
primary_region = "iad"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  DATABASE_URL = "/data/local.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "paywall_data"
  destination = "/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
